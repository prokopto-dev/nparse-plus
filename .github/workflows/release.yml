name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-release tag to package (for example v1.4.0)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  # OSTree repo published to GitHub Pages (gh-pages branch) so
  # `flatpak update` works for sideloaded bundle installs too.
  FLATPAK_REPO_URL: https://prokopto-dev.github.io/nparse-plus/repo
  # Signing key fingerprint (public half committed at
  # packaging/flatpak/nparseplus-repo.gpg; private half in the
  # FLATPAK_GPG_PRIVATE_KEY repo secret).
  FLATPAK_GPG_KEY_ID: 8E0BE7F401945E39444ECF38512B0BCC20C269BC

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Tag must match nparseplus.__version__ and pyproject
        run: |
          TAG="${RELEASE_TAG#v}"
          grep -q "^__version__ = \"$TAG\"$" src/nparseplus/__init__.py \
            || { echo "::error::tag $TAG != __init__.py __version__"; exit 1; }
          grep -q "^version = \"$TAG\"$" pyproject.toml \
            || { echo "::error::tag $TAG != pyproject version"; exit 1; }

  build-macos:
    needs: check-version
    # One DMG per architecture, both built on Apple Silicon. GitHub retired the
    # standard macos-13 Intel runner (x86_64 jobs there hang unscheduled), so the
    # x86_64 build is cross-compiled on the arm64 runner via Rosetta + an x86_64
    # CPython that uv manages. continue-on-error on the x86_64 leg keeps a
    # cross-build hiccup from ever blocking the release (arm64/Windows/Linux);
    # fail-fast off so one arch never cancels the other.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: x86_64
    runs-on: macos-14
    continue-on-error: ${{ matrix.arch == 'x86_64' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Rosetta (x86_64 cross-build)
        if: matrix.arch == 'x86_64'
        run: softwareupdate --install-rosetta --agree-to-license
      - name: Build .app (${{ matrix.arch }})
        run: |
          set -euxo pipefail
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            # Cross-build: an x86_64 interpreter (run via Rosetta) pulls x86_64
            # wheels and makes PyInstaller emit an x86_64 app.
            PY=cpython-3.12-macos-x86_64
            uv python install "$PY"
            uv sync --frozen --group build --python "$PY"
            uv run --python "$PY" pyinstaller packaging/nparseplus.spec --noconfirm
          else
            uv sync --frozen --group build
            uv run pyinstaller packaging/nparseplus.spec --noconfirm
          fi
      - name: Verify architecture
        run: |
          BIN="dist/nParse+.app/Contents/MacOS/nparseplus"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | tr ' ' '\n' | grep -qx "${{ matrix.arch }}" \
            || { echo "::error::built binary is not ${{ matrix.arch }}"; exit 1; }
      - name: Ad-hoc codesign
        run: codesign --force --deep -s - "dist/nParse+.app"
      - name: Build DMG
        run: uv run dmgbuild -s packaging/dmg_settings.py "nParse+" "dist/nParse+-${RELEASE_TAG#v}-macos-${{ matrix.arch }}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          # Artifact names must be unique per matrix leg (upload-artifact@v4);
          # the release job downloads all of them with merge-multiple.
          name: macos-dmg-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies (with build group)
        run: uv sync --frozen --group build
      - name: Build
        run: uv run pyinstaller packaging/nparseplus.spec --noconfirm
      - name: Zip
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          Compress-Archive -Path dist/nparseplus -DestinationPath "dist/nparseplus-$version-win64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: write # force-pushes the flatpak repo to gh-pages
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
      - name: Sync dependencies (with build group)
        run: uv sync --frozen --group build
      - name: Build
        run: uv run pyinstaller packaging/nparseplus.spec --noconfirm
      - name: Tarball
        run: |
          VERSION="${RELEASE_TAG#v}"
          tar -C dist -czf "dist/nparseplus-$VERSION-linux-x86_64.tar.gz" nparseplus
      - name: Install flatpak-builder
        run: sudo apt-get install -y flatpak flatpak-builder dbus
      - name: Import Flatpak signing key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          # Regenerate the public key from the secret rather than trusting
          # the checked-out tree: the checkout is at RELEASE_TAG, which may
          # predate the committed key file (and this also keeps the embedded
          # key correct if the key is ever rotated).
          gpg --export "$FLATPAK_GPG_KEY_ID" > packaging/flatpak/nparseplus-repo.gpg
      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak bundle
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s/@VERSION@/$VERSION/; s/@DATE@/$(date -u +%Y-%m-%d)/" \
            packaging/flatpak/io.github.prokopto_dev.nparse_plus.metainfo.xml
          echo "[$(date -u +%H:%M:%S)] flatpak-builder: build + export (~1 min)"
          flatpak-builder --user --force-clean --repo=flatpak-repo \
            --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-builddir \
            packaging/flatpak/io.github.prokopto_dev.nparse_plus.yml
          # Sign the repo summary too (what clients verify on update).
          echo "[$(date -u +%H:%M:%S)] build-update-repo: re-sign summary (seconds)"
          flatpak build-update-repo --gpg-sign="$FLATPAK_GPG_KEY_ID" flatpak-repo
          # --repo-url: installing the bundle configures its origin remote,
          # so `flatpak update` finds future releases without extra setup.
          # --gpg-keys embeds the public key, making that remote VERIFIED.
          echo "[$(date -u +%H:%M:%S)] build-bundle: xz-compressing ~650 MB into" \
            "the .flatpak — SILENT FOR ~5 MINUTES, this is the slow part"
          flatpak build-bundle \
            --repo-url="$FLATPAK_REPO_URL" \
            --gpg-keys=packaging/flatpak/nparseplus-repo.gpg \
            flatpak-repo \
            "dist/nparseplus-$VERSION-linux-x86_64.flatpak" \
            io.github.prokopto_dev.nparse_plus
          echo "[$(date -u +%H:%M:%S)] bundle done"
      - name: Smoke-test Flatpak bundle
        run: |
          VERSION="${RELEASE_TAG#v}"
          flatpak install --user -y --noninteractive \
            "dist/nparseplus-$VERSION-linux-x86_64.flatpak"
          # Boot the real app headless inside the sandbox; exit 124 means
          # timeout killed it, i.e. it was still running after 20 s.
          set +e
          dbus-run-session -- timeout 20 flatpak run \
            --env=QT_QPA_PLATFORM=offscreen \
            io.github.prokopto_dev.nparse_plus
          code=$?
          set -e
          if [ "$code" -ne 124 ]; then
            echo "::error::flatpak app exited early (code $code)"
            exit 1
          fi
      - name: Verify flatpak update wiring
        run: |
          # The bundle install (smoke test above) must have configured an
          # origin remote pointing at the published repo URL...
          flatpak remotes --user -d | tee remotes.txt
          grep -F "$FLATPAK_REPO_URL" remotes.txt \
            || { echo "::error::bundle origin remote is not $FLATPAK_REPO_URL"; exit 1; }
          # ...and the repo we are about to publish must actually serve the
          # app ref with a VALID SIGNATURE (same checks a client's
          # `flatpak update` performs — this fails if signing breaks).
          flatpak remote-add --user \
            --gpg-import=packaging/flatpak/nparseplus-repo.gpg \
            localtest "file://$(pwd)/flatpak-repo"
          flatpak remote-ls --user localtest | tee refs.txt
          grep -F "io.github.prokopto_dev.nparse_plus" refs.txt \
            || { echo "::error::app ref missing from the flatpak repo"; exit 1; }
      - name: Publish flatpak repo to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Seed from the current gh-pages tree so the mike-managed docs
          # (version dirs, versions.json, root index.html redirect) survive
          # the rebuild; only the flatpak-owned paths are replaced.
          if git clone -q --depth 1 --branch gh-pages "$REMOTE" site; then
            rm -rf site/.git site/repo site/nparseplus.flatpakref site/nparseplus.flatpakrepo
          else
            echo "no existing gh-pages branch; starting fresh"
            mkdir site
          fi
          cp -a flatpak-repo site/repo
          touch site/.nojekyll
          # Embedded public key: remote-add from these files verifies with
          # zero flags.
          GPG_KEY_B64=$(base64 -w0 packaging/flatpak/nparseplus-repo.gpg)
          cat > site/nparseplus.flatpakref <<EOF
          [Flatpak Ref]
          Name=io.github.prokopto_dev.nparse_plus
          Branch=master
          Url=$FLATPAK_REPO_URL
          Title=nParse+ (EverQuest P99 overlay)
          IsRuntime=false
          SuggestRemoteName=nparseplus
          RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo
          GPGKey=$GPG_KEY_B64
          EOF
          cat > site/nparseplus.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=nParse+
          Url=$FLATPAK_REPO_URL
          Homepage=https://github.com/${GITHUB_REPOSITORY}
          Comment=nParse+ EverQuest P99 log-parsing overlay
          GPGKey=$GPG_KEY_B64
          EOF
          # The site root belongs to mike (index.html redirects to the
          # latest docs). Only write a fallback landing page if docs have
          # never been deployed to this branch.
          if [ ! -f site/index.html ]; then
            cat > site/index.html <<EOF
          <!doctype html><title>nParse+ flatpak repo</title>
          <h1>nParse+ Flatpak repository (${RELEASE_TAG})</h1>
          <p>Docs are not deployed yet. See
          <a href="https://github.com/${GITHUB_REPOSITORY}">the repository</a>.</p>
          EOF
          fi
          # Single-commit orphan branch, force-pushed: the repo is rebuilt
          # from scratch each release (clients pull incrementally anyway —
          # ostree fetches only objects they don't already have), and the
          # branch never accumulates history. The docs tree carried over
          # above rides along in the same single commit; mike only needs
          # tree state, not history, so re-orphaning under it is safe.
          cd site
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "flatpak repo for ${RELEASE_TAG}"
          git push --force "$REMOTE" gh-pages
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.tar.gz
            dist/*.flatpak
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract this version's changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## .*v?" version "([ (]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See the full changelog for v$VERSION." > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
          body_path: release-notes.md

  # Versioned docs deploy. Runs after `release` (which needs build-linux), so
  # the flatpak step's orphan force-push of gh-pages has already landed and
  # mike commits on top of it — no race within a release run. The concurrency
  # group is shared with docs-dev.yml to serialize mike pushes.
  docs:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gh-pages-docs
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Fetch gh-pages for mike
        run: git fetch origin gh-pages --depth=1
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync docs dependencies
        run: uv sync --frozen --only-group docs
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy versioned docs
        run: |
          VERSION="${RELEASE_TAG#v}"
          DOCS_VERSION="${VERSION%.*}"   # 1.4.1 -> 1.4
          uv run mike deploy --push --update-aliases "$DOCS_VERSION" latest
          uv run mike set-default --push latest

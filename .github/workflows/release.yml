name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-release tag to package (for example v1.4.0)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Tag must match nparseplus.__version__ and pyproject
        run: |
          TAG="${RELEASE_TAG#v}"
          grep -q "^__version__ = \"$TAG\"$" src/nparseplus/__init__.py \
            || { echo "::error::tag $TAG != __init__.py __version__"; exit 1; }
          grep -q "^version = \"$TAG\"$" pyproject.toml \
            || { echo "::error::tag $TAG != pyproject version"; exit 1; }

  build-macos:
    needs: check-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies (with build group)
        run: uv sync --frozen --group build
      - name: Build .app
        run: uv run pyinstaller packaging/nparseplus.spec --noconfirm
      - name: Ad-hoc codesign
        run: codesign --force --deep -s - "dist/nParse+.app"
      - name: Build DMG
        run: uv run dmgbuild -s packaging/dmg_settings.py "nParse+" "dist/nParse+-${RELEASE_TAG#v}-macos-arm64.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Sync dependencies (with build group)
        run: uv sync --frozen --group build
      - name: Build
        run: uv run pyinstaller packaging/nparseplus.spec --noconfirm
      - name: Zip
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          Compress-Archive -Path dist/nparseplus -DestinationPath "dist/nparseplus-$version-win64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  build-linux:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
      - name: Sync dependencies (with build group)
        run: uv sync --frozen --group build
      - name: Build
        run: uv run pyinstaller packaging/nparseplus.spec --noconfirm
      - name: Tarball
        run: |
          VERSION="${RELEASE_TAG#v}"
          tar -C dist -czf "dist/nparseplus-$VERSION-linux-x86_64.tar.gz" nparseplus
      - name: Install flatpak-builder
        run: sudo apt-get install -y flatpak flatpak-builder dbus
      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Build Flatpak bundle
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s/@VERSION@/$VERSION/; s/@DATE@/$(date -u +%Y-%m-%d)/" \
            packaging/flatpak/io.github.prokopto_dev.nparse_plus.metainfo.xml
          flatpak-builder --user --force-clean --repo=flatpak-repo flatpak-builddir \
            packaging/flatpak/io.github.prokopto_dev.nparse_plus.yml
          flatpak build-bundle flatpak-repo \
            "dist/nparseplus-$VERSION-linux-x86_64.flatpak" \
            io.github.prokopto_dev.nparse_plus
      - name: Smoke-test Flatpak bundle
        run: |
          VERSION="${RELEASE_TAG#v}"
          flatpak install --user -y --noninteractive \
            "dist/nparseplus-$VERSION-linux-x86_64.flatpak"
          # Boot the real app headless inside the sandbox; exit 124 means
          # timeout killed it, i.e. it was still running after 20 s.
          set +e
          dbus-run-session -- timeout 20 flatpak run \
            --env=QT_QPA_PLATFORM=offscreen \
            io.github.prokopto_dev.nparse_plus
          code=$?
          set -e
          if [ "$code" -ne 124 ]; then
            echo "::error::flatpak app exited early (code $code)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.tar.gz
            dist/*.flatpak
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract this version's changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## .*v?" version "([ (]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See the full changelog for v$VERSION." > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
          body_path: release-notes.md

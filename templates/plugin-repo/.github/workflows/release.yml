name: Release

# Tag vX.Y.Z (matching PluginMeta.version) to publish a GitHub release with
# the installable zip, its sha256, and a ready-made registry entry JSON.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Rename this when you rename the plugin package directory.
  PLUGIN_DIR: my_nparse_plugin

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SDK
        run: |
          # Until nparseplus-sdk is on PyPI, install it from the app repo.
          python -m pip install "nparseplus-sdk @ git+https://github.com/prokopto-dev/nparse-plus#subdirectory=sdk"

      - name: Validate plugin
        run: nparseplus-plugin validate "$PLUGIN_DIR"

      - name: Check tag matches PluginMeta.version
        run: |
          python - <<'EOF'
          import os, sys
          from nparseplus_sdk.loading import load_plugin_factory

          plugin = load_plugin_factory(os.environ["PLUGIN_DIR"])()
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if plugin.meta.version != tag:
              sys.exit(
                  f"tag v{tag} does not match PluginMeta.version "
                  f"{plugin.meta.version} — bump meta.version and re-tag"
              )
          print(f"ok: {plugin.meta.id} v{tag}")
          EOF

      - name: Build zip (single-root layout the nParse+ installer requires)
        run: |
          zip -r "${PLUGIN_DIR}.zip" "$PLUGIN_DIR" \
            -x "*/__pycache__/*" -x "*.pyc"
          sha256sum "${PLUGIN_DIR}.zip" | tee sha256.txt

      - name: Compose release body (includes the registry entry JSON)
        run: |
          python - <<'EOF'
          import hashlib, json, os
          from nparseplus_sdk.loading import load_plugin_factory

          plugin_dir = os.environ["PLUGIN_DIR"]
          meta = load_plugin_factory(plugin_dir)().meta
          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["GITHUB_REF_NAME"]
          url = (
              f"https://github.com/{repo}/releases/download/{tag}/{plugin_dir}.zip"
          )
          digest = hashlib.sha256(open(f"{plugin_dir}.zip", "rb").read()).hexdigest()
          entry = {
              "id": meta.id,
              "name": meta.name,
              "description": meta.description,
              "author": meta.author,
              "homepage": meta.homepage or f"https://github.com/{repo}",
              "latest": {
                  "version": meta.version,
                  "url": url,
                  "sha256": digest,
                  "requires_sdk": meta.requires_sdk,
                  **(
                      {"min_app_version": meta.min_app_version}
                      if meta.min_app_version
                      else {}
                  ),
              },
          }
          body = (
              f"## {meta.name} v{meta.version}\n\n"
              f"Install: nParse+ → Settings → Plugins → *Install from URL* with the "
              f"zip asset below, or wait for the registry listing.\n\n"
              f"`sha256: {digest}`\n\n"
              "### Registry entry (for the nparseplus-plugins index PR)\n\n"
              "```json\n" + json.dumps(entry, indent=2) + "\n```\n"
          )
          open("release-body.md", "w").write(body)
          open("registry-entry.json", "w").write(json.dumps(entry, indent=2))
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-body.md \
            "${PLUGIN_DIR}.zip" registry-entry.json

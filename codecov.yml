coverage:
  precision: 1
  round: down
  range: 60..90
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tools/**"
  - "packaging/**"
  - "locationserver/**"
